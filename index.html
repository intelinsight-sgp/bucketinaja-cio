<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUKETINAJA v18 - ULTRA SPEED</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff75a0; --pastel: #fce4ec; --dark: #2d3436; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: var(--pastel); overflow: hidden; }

        /* --- FIX KEGAGALAN BAR HARGA (CSS SCOPING) --- */
        .viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        .slide-container { display: flex; width: 400vw; height: 100vh; transition: transform 0.3s cubic-bezier(0, 0, 0.2, 1); }
        .slide { width: 100vw; height: 100vh; flex: 0 0 100vw; position: relative; display: flex; flex-direction: column; }

        /* Bar harga sekarang hanya ada DI DALAM slide 1 */
        .price-sticky-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: white; padding: 20px; display: flex; 
            justify-content: space-between; align-items: center;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 10;
        }

        /* --- LAYOUT KASIR FAST RESPONSE --- */
        #screen-kasir { display: grid; grid-template-columns: 1fr 380px; height: 100vh; background: #eef2f3; }
        .active-area { padding: 20px; overflow-y: auto; }
        .side-area { background: white; padding: 20px; border-left: 2px solid #ddd; overflow-y: auto; }
        
        .card-new { 
            background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; 
            border-left: 10px solid var(--pink); animation: popIn 0.2s ease-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .price-big { font-size: 1.8rem; font-weight: 800; color: var(--dark); display: block; margin: 10px 0; }
        .btn-action { padding: 12px 20px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; color: white; }

        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; overflow-y: auto; flex: 1; padding-bottom: 100px; }
        .item-card { background: white; border-radius: 12px; padding: 15px; text-align: center; border: 3px solid transparent; }
        .item-card.active { border-color: var(--pink); background: #fff9fb; }

        #lock-screen { position: fixed; inset: 0; background: black; z-index: 9999; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="bg-music" src="musikcio.mp3" loop></audio>

    <div id="auth-screen" style="position:fixed; inset:0; background:white; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <button onclick="init('kasir')" style="padding:20px 40px; background:var(--dark); color:white; border-radius:15px; border:none; margin-bottom:10px;">MODE KASIR</button>
        <button onclick="init('customer')" style="padding:20px 40px; background:var(--pink); color:white; border-radius:15px; border:none;">MODE CUSTOMER</button>
    </div>

    <div id="screen-kasir" class="hidden">
        <div class="active-area">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>PESANAN MASUK ✨</h2>
                <div>
                    <button onclick="pwr(true)" style="background:green; color:white; padding:10px;">ON</button>
                    <button onclick="pwr(false)" style="background:red; color:white; padding:10px;">OFF</button>
                </div>
            </div>
            <div id="list-aktif"></div>
        </div>
        <div class="side-area">
            <h3>Penyelesaian & Omzet</h3>
            <div id="list-selesai"></div>
            <div style="background:var(--dark); color:white; padding:20px; border-radius:15px; margin-top:20px;">
                <p>TOTAL PENDAPATAN:</p>
                <h2 id="total-omzet">Rp0</h2>
            </div>
        </div>
    </div>

    <div id="screen-customer" class="hidden">
        <div id="lock-screen" class="hidden"><h1>OFFLINE</h1></div>
        <div class="viewport">
            <div class="slide-container" id="slider">
                <div class="slide">
                    <div class="product-grid" id="menu"></div>
                    <div class="price-sticky-bar">
                        <h2 id="view-total" style="color:var(--pink)">Rp0</h2>
                        <button onclick="go(1)" style="background:var(--pink); color:white; padding:15px 30px; border:none; border-radius:50px; font-weight:800;">LANJUT ➔</button>
                    </div>
                </div>
                <div class="slide" style="justify-content:center; align-items:center;">
                    <div style="background:white; padding:40px; border-radius:20px; text-align:center; width:80%;">
                        <h3>Ketik Nama Kakak ✨</h3>
                        <input type="text" id="in-nama" style="width:100%; padding:15px; margin-top:15px; text-align:center; font-size:1.2rem;">
                        <button onclick="kirim()" style="width:100%; background:var(--pink); color:white; padding:15px; border:none; margin-top:15px; font-weight:800;">PESAN SEKARANG</button>
                    </div>
                </div>
                <div class="slide" style="justify-content:center; align-items:center; text-align:center;">
                    <h1>💳</h1>
                    <h2>MENUJU KASIR</h2>
                    <p>Silahkan bayar agar pesanan dibuat.</p>
                </div>
                <div class="slide" style="justify-content:center; align-items:center; text-align:center;">
                    <p>NOMOR ANTREAN</p>
                    <h1 id="q-num" style="font-size:12rem; color:var(--pink);">0</h1>
                    <h2 id="q-name">NAMA</h2>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        const conf = { databaseURL: "https://bucketinaja-f19db-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(conf);
        const db = firebase.database();

        let cart = [];
        let myId = null;
        const prods = [
            {n:"BUKET FULL", p:55000, e:"💐"}, {n:"KERTAS WARNA", p:10000, e:"🎁"},
            {n:"KERTAS PUTIH", p:5000, e:"📄"}, {n:"BUNGA HIAS", p:15000, e:"🌹"},
            {n:"SNACK BUCKET", p:35000, e:"🍫"}, {n:"KADO", p:75000, e:"💖"}
        ];

        function init(r){
            if(prompt("PIN")==="172737"){
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById(`screen-${r}`).classList.remove('hidden');
                if(r==='kasir') engineKasir(); else engineCust();
            }
        }

        // --- CUSTOMER ENGINE ---
        function engineCust(){
            const m = document.getElementById('menu');
            m.innerHTML = prods.map((p,i)=>`
                <div class="item-card" id="pc-${i}" onclick="add(${i})">
                    <div style="font-size:2rem">${p.e}</div>
                    <b>${p.n}</b><br>Rp${p.p.toLocaleString()}
                </div>`).join('');

            db.ref('system/isPowerOn').on('value', s => {
                const on = s.val();
                document.getElementById('lock-screen').classList.toggle('hidden', on);
                const music = document.getElementById('bg-music');
                if(!on) music.play(); else { music.pause(); sapa(); go(0); reset(); }
            });

            // FAST RESPONSE LISTENER
            db.ref('orders').on('child_changed', snap => {
                const o = snap.val();
                if(snap.key === myId && o.status === 'approved'){
                    document.getElementById('q-num').innerText = o.queue;
                    document.getElementById('q-name').innerText = o.name;
                    go(3);
                    setTimeout(()=>{ go(0); reset(); }, 8000);
                }
                if(o.status === 'done' && !o.panggil){
                    speak(`Pesanan ${o.name} selesai.`);
                    db.ref(`orders/${snap.key}`).update({panggil:true});
                }
            });
        }

        function add(i){
            cart.push(prods[i]);
            document.getElementById(`pc-${i}`).classList.add('active');
            document.getElementById('view-total').innerText = "Rp"+cart.reduce((a,b)=>a+b.p,0).toLocaleString();
        }

        function kirim(){
            const n = document.getElementById('in-nama').value;
            if(!n || cart.length===0) return;
            const ref = db.ref('orders').push();
            myId = ref.key;
            ref.set({
                name: n.toUpperCase(), items: cart, total: cart.reduce((a,b)=>a+b.p,0),
                status: 'wait', panggil: false, queue: 0, 
                waktu: new Date().toLocaleTimeString('id-ID') + " " + new Date().toLocaleDateString('id-ID')
            }).then(()=> go(2));
        }

        // --- KASIR ENGINE (ULTRA FAST) ---
        function engineKasir(){
            db.ref('orders').on('value', snap => {
                const act = document.getElementById('list-aktif');
                const done = document.getElementById('list-selesai');
                act.innerHTML = ""; done.innerHTML = "";
                let rev = 0;

                snap.forEach(c => {
                    const o = c.val();
                    const iStr = o.items.map(i=>i.n).join(", ");
                    if(o.status !== 'done'){
                        act.innerHTML += `
                        <div class="card-new">
                            <div style="display:flex; justify-content:space-between">
                                <b>👤 ${o.name}</b> <small>${o.waktu}</small>
                            </div>
                            <p style="margin:5px 0; font-size:0.9rem;">${iStr}</p>
                            <span class="price-big">Rp${o.total.toLocaleString()}</span>
                            <div style="text-align:right">
                                ${o.status==='wait' ? 
                                `<button class="btn-action" style="background:green" onclick="app('${c.key}')">APPROVE BAYAR</button>` :
                                `<button class="btn-action" style="background:orange" onclick="fin('${c.key}')">PANGGIL SELESAI</button>`}
                            </div>
                        </div>`;
                    } else {
                        rev += o.total;
                        done.innerHTML += `<div style="padding:5px; border-bottom:1px solid #ddd;"><b>${o.name}</b> - Rp${o.total.toLocaleString()}</div>`;
                    }
                });
                document.getElementById('total-omzet').innerText = "Rp"+rev.toLocaleString();
            });
        }

        function app(k){
            db.ref('lastQueue').transaction(q => {
                const next = (q||0)+1;
                db.ref(`orders/${k}`).update({status:'approved', queue:next});
                return next;
            });
        }
        function fin(k){ db.ref(`orders/${k}`).update({status:'done', panggil:false}); }
        function pwr(b){ db.ref('system').update({isPowerOn:b}); }
        function go(i){ document.getElementById('slider').style.transform = `translateX(-${i*100}vw)`; }
        function reset(){ cart=[]; document.getElementById('view-total').innerText="Rp0"; document.getElementById('in-nama').value=""; document.querySelectorAll('.item-card').forEach(e=>e.classList.remove('active')); }
        function speak(t){ const u = new SpeechSynthesisUtterance(t); u.lang='id-ID'; window.speechSynthesis.speak(u); }
        function sapa(){ const h = new Date().getHours(); speak(`Selamat ${h<12?'Pagi':h<15?'Siang':h<18?'Sore':'Malam'}, silahkan pilih pesanan anda.`); }
    </script>
</body>
</html>
