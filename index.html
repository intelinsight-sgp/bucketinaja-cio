<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUKETINAJA v14 - Full Responsive</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff75a0; --pastel: #fce4ec; --purple: #9c27b0; --dark: #2d3436; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: var(--pastel); overflow: hidden; }
        
        .hidden { display: none !important; }

        /* --- LAYOUT CUSTOMER --- */
        .viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; }
        .slide-container { display: flex; width: 400vw; height: 100vh; transition: transform 0.4s ease-out; }
        .slide { width: 100vw; height: 100vh; flex: 0 0 100vw; display: flex; flex-direction: column; overflow-y: auto; }

        .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .item-card { background: white; border-radius: 12px; padding: 10px; text-align: center; border: 3px solid transparent; }
        .item-card.active { border-color: var(--pink); background: #fff9fb; }
        
        .bottom-nav { padding: 20px; background: white; text-align: center; margin-top: auto; border-radius: 20px 20px 0 0; }
        .btn-pink { background: var(--pink); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; width: 80%; }

        /* --- LAYOUT KASIR --- */
        #screen-kasir { display: grid; grid-template-columns: 1fr 350px; height: 100vh; background: #f0f2f5; }
        .main-panel { padding: 20px; overflow-y: auto; border-right: 1px solid #ddd; }
        .side-panel { padding: 20px; background: white; overflow-y: auto; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-done { border-left: 5px solid #2ecc71; opacity: 0.8; font-size: 0.8rem; }
        
        #lock-screen { position: fixed; inset: 0; background: black; z-index: 9999; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <audio id="bg-music" src="musikcio.mp3" loop></audio>

    <div id="login-modal" style="position:fixed; inset:0; background:white; z-index:10000; display:flex; justify-content:center; align-items:center; flex-direction:column;">
        <h1 style="color:var(--purple)">BUKET IN AJA</h1>
        <button class="btn-pink" onclick="auth('kasir')" style="background:var(--dark); margin-bottom:10px">MODE KASIR</button>
        <button class="btn-pink" onclick="auth('customer')">MODE CUSTOMER</button>
    </div>

    <div id="screen-kasir" class="hidden">
        <div class="main-panel">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px">
                <h2>Pesanan Aktif 🌸</h2>
                <div>
                    <button onclick="setPower(true)" style="background:green; color:white; border:none; padding:10px; border-radius:8px">ON</button>
                    <button onclick="setPower(false)" style="background:red; color:white; border:none; padding:10px; border-radius:8px">OFF</button>
                </div>
            </div>
            <div id="active-orders"></div>
        </div>
        <div class="side-panel">
            <h3>Draf Selesai (Pendapatan)</h3>
            <div id="done-orders"></div>
            <hr>
            <h4 id="total-revenue">Total: Rp0</h4>
        </div>
    </div>

    <div id="screen-customer" class="hidden">
        <div id="lock-screen" class="hidden"><h1>OFFLINE</h1><p>Musik sedang diputar...</p></div>
        <div class="viewport">
            <div class="slide-container" id="main-slider">
                <div class="slide">
                    <h3 style="text-align:center">Silahkan Pilih Pesanan 🌸</h3>
                    <div class="product-grid" id="menu-container"></div>
                    <div class="bottom-nav">
                        <p>Total: <b id="total-price" style="color:var(--pink)">Rp0</b></p>
                        <button class="btn-pink" onclick="goToStep(1)">SELESAI PESAN</button>
                    </div>
                </div>
                <div class="slide" style="justify-content:center; align-items:center;">
                    <div style="background:white; padding:30px; border-radius:20px; text-align:center; width:80%">
                        <h3>Siapa Nama Kakak? ✨</h3>
                        <input type="text" id="cust-name" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; text-align:center">
                        <button class="btn-pink" style="margin-top:20px" onclick="goToStep(2)">KONFIRMASI</button>
                    </div>
                </div>
                <div class="slide" style="justify-content:center; align-items:center; text-align:center;">
                    <h2>SILAHKAN KE KASIR</h2>
                    <p>Pesanan Anda sedang kami tunggu pembayarannya.</p>
                </div>
                <div class="slide" style="justify-content:center; align-items:center; text-align:center;">
                    <p>NOMOR ANTREAN</p>
                    <h1 style="font-size:10rem; color:var(--purple); margin:0" id="final-queue">0</h1>
                    <h2 id="final-name">NAMA</h2>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://bucketinaja-f19db-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cart = [];
        let myRole = "";
        let currentOrderId = null;

        const items = [
            { n: "BUKET FULL", p: 55000, e: "💐" },
            { n: "KERTAS WARNA", p: 10000, e: "🎁" },
            { n: "KERTAS PUTIH", p: 5000, e: "📄" },
            { n: "BUNGA HIAS", p: 15000, e: "🌹" },
            { n: "SNACK BUCKET", p: 35000, e: "🍫" },
            { n: "KADO", p: 75000, e: "💖" }
        ];

        function auth(role) {
            if(prompt("PIN:") === "172737") {
                myRole = role;
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById(`screen-${role}`).classList.remove('hidden');
                if(role === 'kasir') initKasir(); else initCustomer();
            }
        }

        // FORMAT WAKTU LENGKAP
        function getWaktu() {
            const d = new Date();
            const pad = (n) => n < 10 ? '0'+n : n;
            return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
        }

        // --- CUSTOMER SIDE ---
        function initCustomer() {
            const container = document.getElementById('menu-container');
            container.innerHTML = items.map((m, i) => `
                <div class="item-card" id="i-${i}" onclick="addCart('${m.n}', ${m.p}, ${i})">
                    <span style="font-size:2rem; display:block">${m.e}</span>
                    <b style="font-size:0.75rem">${m.n}</b><br>
                    <small>Rp${m.p.toLocaleString()}</small>
                </div>
            `).join('');

            db.ref('system/isPowerOn').on('value', s => {
                const isON = s.val();
                document.getElementById('lock-screen').classList.toggle('hidden', isON);
                const music = document.getElementById('bg-music');
                if(!isON) { music.play().catch(e => {}); } 
                else { music.pause(); music.currentTime = 0; playSapaan(); goToStep(0); resetCustomer(); }
            });

            // RESPONSIVE PANGGIL (CHILD_CHANGED)
            db.ref('orders').on('child_changed', snap => {
                const o = snap.val();
                if(snap.key === currentOrderId) {
                    if(o.status === 'approved') {
                        document.getElementById('final-queue').innerText = o.queue;
                        document.getElementById('final-name').innerText = o.name;
                        goToStep(3); // Langsung ke antrean
                        setTimeout(() => { goToStep(0); resetCustomer(); }, 5000); // 5 detik balik menu
                    }
                }
                // PANGGIL SUARA (CEK FLAG)
                if(o.status === 'done' && !o.panggil) {
                    speak(`Pesanan atas nama ${o.name} sudah selesai. Silahkan diambil.`);
                    db.ref(`orders/${snap.key}`).update({ panggil: true });
                }
            });
        }

        function addCart(n, p, i) {
            cart.push({n, p, total: p});
            document.getElementById(`i-${i}`).classList.add('active');
            document.getElementById('total-price').innerText = "Rp" + cart.reduce((a,b)=>a+b.p,0).toLocaleString();
        }

        function resetCustomer() {
            cart = [];
            document.getElementById('total-price').innerText = "Rp0";
            document.getElementById('cust-name').value = "";
            document.querySelectorAll('.item-card').forEach(el => el.classList.remove('active'));
        }

        function goToStep(s) {
            if(s === 2) {
                const name = document.getElementById('cust-name').value;
                if(!name) return alert("Isi nama dulu!");
                const ref = db.ref('orders').push();
                currentOrderId = ref.key;
                const totalBayar = cart.reduce((a,b)=>a+b.p,0);
                ref.set({ 
                    name, 
                    items: cart, 
                    status: 'wait', 
                    panggil: false, 
                    queue: 0, 
                    waktu: getWaktu(),
                    totalHarga: totalBayar 
                });
            }
            document.getElementById('main-slider').style.transform = `translateX(-${s * 100}vw)`;
        }

        // --- KASIR SIDE ---
        function initKasir() {
            db.ref('orders').on('value', snap => {
                const activeDiv = document.getElementById('active-orders');
                const doneDiv = document.getElementById('done-orders');
                activeDiv.innerHTML = "";
                doneDiv.innerHTML = "";
                let totalIncome = 0;

                snap.forEach(child => {
                    const o = child.val();
                    const itemStr = o.items ? o.items.map(i => i.n).join(', ') : '';
                    
                    if(o.status !== 'done') {
                        activeDiv.innerHTML += `
                            <div class="card">
                                <b>${o.name}</b> <small>(${o.waktu})</small><br>
                                <p style="margin:5px 0">${itemStr}</p>
                                <b>Rp${o.totalHarga.toLocaleString()}</b><br><br>
                                <button onclick="approve('${child.key}')" style="background:#2ecc71; color:white; border:none; padding:8px">APPROVE (BALIK MENU)</button>
                                <button onclick="finish('${child.key}')" style="background:orange; color:white; border:none; padding:8px; margin-left:5px">PANGGIL CUSTOMER</button>
                            </div>`;
                    } else {
                        totalIncome += o.totalHarga;
                        doneDiv.innerHTML += `
                            <div class="card card-done">
                                <b>${o.name}</b> - Rp${o.totalHarga.toLocaleString()}<br>
                                <small>${o.waktu}</small>
                            </div>`;
                    }
                });
                document.getElementById('total-revenue').innerText = "Total Pendapatan: Rp" + totalIncome.toLocaleString();
            });
        }

        function approve(k) {
            db.ref('lastQueue').transaction(q => {
                const n = (q || 0) + 1;
                db.ref(`orders/${k}`).update({ status: 'approved', queue: n });
                return n;
            });
        }
        
        function finish(k) { 
            db.ref(`orders/${k}`).update({ status: 'done', panggil: false }); 
        }

        function setPower(v) { db.ref('system').update({ isPowerOn: v }); }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'id-ID'; u.rate = 0.9;
            window.speechSynthesis.speak(u);
        }

        function playSapaan() {
            const h = new Date().getHours();
            let s = h<12?"Pagi":h<15?"Siang":h<18?"Sore":"Malam";
            speak(`Selamat ${s}, silahkan pilih pesanan anda.`);
        }
    </script>
</body>
</html>
