<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUKETINAJA ULTIMATE v17</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-primary: #ff75a0;
            --pink-light: #fce4ec;
            --purple-dark: #6c5ce7;
            --dark-bg: #1e272e;
            --white: #ffffff;
            --success: #00b894;
            --warning: #f1c40f;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Poppins', sans-serif; background: var(--pink-light); 
            overflow: hidden; color: #2d3436;
        }

        .hidden { display: none !important; }
        .btn { border: none; border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; }
        .btn:active { transform: scale(0.95); }

        /* --- TAMPILAN KASIR --- */
        #screen-kasir { display: grid; grid-template-columns: 1fr 400px; height: 100vh; background: #dfe6e9; }
        .panel-orders { padding: 30px; overflow-y: auto; }
        .panel-sidebar { background: var(--white); padding: 30px; display: flex; flex-direction: column; border-left: 2px solid #ccc; }
        
        .order-ticket {
            background: var(--white); border-radius: 20px; padding: 25px; margin-bottom: 20px;
            box-shadow: var(--shadow); border-left: 12px solid var(--pink-primary);
            position: relative;
        }

        /* Highlight Harga di Kasir */
        .price-tag-kasir {
            background: var(--dark-bg); color: var(--pink-primary);
            padding: 10px 20px; border-radius: 12px; font-size: 1.5rem;
            font-weight: 800; display: inline-block; margin: 10px 0;
            border: 2px solid var(--pink-primary);
        }

        .wait-badge { background: var(--warning); color: #000; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }
        .approved-badge { background: var(--success); color: #fff; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; }

        /* --- TAMPILAN CUSTOMER --- */
        .viewport { width: 100vw; height: 100vh; overflow: hidden; position: relative; }
        .slide-container { display: flex; width: 400vw; height: 100vh; transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1); }
        .slide { width: 100vw; height: 100vh; flex: 0 0 100vw; display: flex; flex-direction: column; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; padding-bottom: 120px; overflow-y: auto; }
        .product-card { background: var(--white); border-radius: 20px; padding: 15px; text-align: center; border: 4px solid transparent; box-shadow: var(--shadow); cursor: pointer; }
        .product-card.selected { border-color: var(--pink-primary); background: #fff5f8; }
        
        .bottom-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px); padding: 15px 30px; border-radius: 100px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow);
        }

        #lock-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body>

    <audio id="audio-bg" src="musikcio.mp3" loop></audio>

    <div id="auth-screen" style="position:fixed; inset:0; background:var(--white); z-index:10001; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:var(--purple-dark); margin:0;">BUKET IN AJA</h1>
        <p>System Management v17</p>
        <div style="margin-top:20px;">
            <button class="btn" style="padding:15px 30px; background:#333; color:#fff;" onclick="initSystem('kasir')">KASIR</button>
            <button class="btn" style="padding:15px 30px; background:var(--pink-primary); color:#fff; margin-left:10px;" onclick="initSystem('customer')">CUSTOMER</button>
        </div>
    </div>

    <div id="screen-kasir" class="hidden">
        <div class="panel-orders">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>Antrean Masuk 🛎️</h2>
                <div>
                    <button class="btn" style="background:red; color:white; padding:10px 20px;" onclick="toggleKiosk(false)">OFF</button>
                    <button class="btn" style="background:green; color:white; padding:10px 20px; margin-left:10px;" onclick="toggleKiosk(true)">ON</button>
                </div>
            </div>
            <div id="active-container"></div>
        </div>
        <div class="panel-sidebar">
            <h3>Draf Selesai</h3>
            <div id="history-container" style="flex:1; overflow-y:auto; margin-bottom:20px;"></div>
            <div style="background:var(--dark-bg); color:white; padding:20px; border-radius:20px; text-align:center;">
                <small>OMZET HARI INI</small>
                <h2 id="total-revenue" style="color:var(--pink-primary); margin:5px 0 0 0;">Rp0</h2>
            </div>
        </div>
    </div>

    <div id="screen-customer" class="hidden">
        <div id="lock-overlay" class="hidden"><h1>OFFLINE</h1><p>Musik istirahat diputar...</p></div>
        <div class="viewport">
            <div class="slide-container" id="master-slider">
                <div class="slide">
                    <div class="menu-grid" id="menu-injector"></div>
                    <div class="bottom-bar">
                        <h2 id="display-price" style="margin:0; color:var(--pink-primary);">Rp0</h2>
                        <button class="btn" style="background:var(--pink-primary); color:white; padding:15px 35px;" onclick="navigateSlide(1)">LANJUTKAN ➔</button>
                    </div>
                </div>
                <div class="slide" style="justify-content:center; align-items:center;">
                    <div style="background:white; padding:40px; border-radius:30px; text-align:center; width:80%; max-width:450px; box-shadow:var(--shadow);">
                        <h3>Nama Kakak? ✨</h3>
                        <input type="text" id="input-name" style="width:100%; padding:15px; border-radius:15px; border:2px solid #eee; text-align:center; font-size:1.2rem;">
                        <button class="btn" style="width:100%; padding:15px; background:var(--pink-primary); color:white; margin-top:20px;" onclick="processOrder()">KONFIRMASI PESANAN</button>
                    </div>
                </div>
                <div class="slide" style="justify-content:center; align-items:center; text-align:center;">
                    <h1 style="font-size:5rem;">💳</h1>
                    <h2>PESANAN TERKIRIM</h2>
                    <p>Silahkan lakukan pembayaran di kasir agar pesanan diproses.</p>
                </div>
                <div class="slide" style="justify-content:center; align-items:center; text-align:center;">
                    <p>NOMOR ANTREAN</p>
                    <h1 id="view-queue" style="font-size:12rem; margin:0; color:var(--purple-dark);">0</h1>
                    <h2 id="view-name" style="color:var(--pink-primary);">NAMA</h2>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://bucketinaja-f19db-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let cart = [];
        let myOrderId = null;
        const products = [
            { id: 1, name: "BUKET FULL", price: 55000, e: "💐" },
            { id: 2, name: "KERTAS WARNA", price: 10000, e: "🎁" },
            { id: 3, name: "KERTAS PUTIH", price: 5000, e: "📄" },
            { id: 4, name: "BUNGA HIAS", price: 15000, e: "🌹" },
            { id: 5, name: "SNACK BUCKET", price: 35000, e: "🍫" },
            { id: 6, name: "KADO SPESIAL", price: 75000, e: "💖" }
        ];

        function initSystem(role) {
            if(prompt("PIN:") === "172737") {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById(`screen-${role}`).classList.remove('hidden');
                if(role === 'kasir') startKasir(); else startCustomer();
            }
        }

        // CUSTOMER ENGINE
        function startCustomer() {
            const grid = document.getElementById('menu-injector');
            grid.innerHTML = products.map((p, i) => `
                <div class="product-card" id="p-${p.id}" onclick="toggleSelect(${i})">
                    <span style="font-size:2.5rem">${p.e}</span><br>
                    <b>${p.name}</b><br>
                    <small>Rp${p.price.toLocaleString()}</small>
                </div>
            `).join('');

            database.ref('system/isPowerOn').on('value', s => {
                const on = s.val();
                document.getElementById('lock-overlay').classList.toggle('hidden', on);
                const music = document.getElementById('audio-bg');
                if(!on) music.play(); else { music.pause(); music.currentTime = 0; sapa(); resetCust(); }
            });

            database.ref('orders').on('child_changed', snap => {
                const o = snap.val();
                if(snap.key === myOrderId && o.status === 'approved') {
                    document.getElementById('view-queue').innerText = o.queue;
                    document.getElementById('view-name').innerText = o.name;
                    navigateSlide(3);
                    setTimeout(() => { navigateSlide(0); resetCust(); }, 10000);
                }
                if(o.status === 'done' && !o.panggil) {
                    speak(`Pesanan ${o.name} sudah selesai.`);
                    database.ref(`orders/${snap.key}`).update({ panggil: true });
                }
            });
        }

        function toggleSelect(i) {
            const p = products[i];
            const card = document.getElementById(`p-${p.id}`);
            const idx = cart.findIndex(c => c.id === p.id);
            if(idx > -1) { cart.splice(idx, 1); card.classList.remove('selected'); }
            else { cart.push(p); card.classList.add('selected'); }
            document.getElementById('display-price').innerText = "Rp" + cart.reduce((a,b)=>a+b.price,0).toLocaleString();
        }

        function processOrder() {
            const name = document.getElementById('input-name').value;
            if(!name || cart.length === 0) return alert("Pilih menu & isi nama!");
            const ref = database.ref('orders').push();
            myOrderId = ref.key;
            ref.set({
                name: name.toUpperCase(),
                items: cart,
                total: cart.reduce((a,b)=>a+b.price,0),
                status: 'wait',
                panggil: false,
                waktu: new Date().toLocaleString('id-ID'),
                queue: 0
            }).then(() => navigateSlide(2));
        }

        // KASIR ENGINE
        function startKasir() {
            database.ref('orders').on('value', snap => {
                const container = document.getElementById('active-container');
                const history = document.getElementById('history-container');
                container.innerHTML = ""; history.innerHTML = "";
                let revenue = 0;

                snap.forEach(child => {
                    const o = child.val();
                    const itemStr = o.items.map(i => i.name).join(", ");
                    
                    if(o.status !== 'done') {
                        container.innerHTML += `
                            <div class="order-ticket">
                                <div style="display:flex; justify-content:space-between">
                                    <b>👤 ${o.name}</b>
                                    <span class="${o.status === 'wait' ? 'wait-badge' : 'approved-badge'}">
                                        ${o.status === 'wait' ? 'BELUM BAYAR' : 'ANTREAN #' + o.queue}
                                    </span>
                                </div>
                                <div style="margin:10px 0; font-size:0.9rem; color:#555">ITEM: ${itemStr}</div>
                                
                                <div class="price-tag-kasir">Rp${o.total.toLocaleString()}</div>
                                
                                <div style="text-align:right">
                                    ${o.status === 'wait' ? 
                                        `<button class="btn" style="background:green; color:white; padding:10px 20px" onclick="approve('${child.key}')">TERIMA BAYAR (APPROVE)</button>` : 
                                        `<button class="btn" style="background:orange; color:white; padding:10px 20px" onclick="finish('${child.key}')">PANGGIL SELESAI</button>`
                                    }
                                </div>
                                <div style="font-size:0.6rem; color:#999; margin-top:10px">${o.waktu}</div>
                            </div>
                        `;
                    } else {
                        revenue += o.total;
                        history.innerHTML += `
                            <div style="border-bottom:1px solid #eee; padding:10px 0;">
                                <b>${o.name}</b> • Rp${o.total.toLocaleString()}<br>
                                <small>${o.waktu}</small>
                            </div>
                        `;
                    }
                });
                document.getElementById('total-revenue').innerText = "Rp" + revenue.toLocaleString();
            });
        }

        function approve(k) {
            database.ref('lastQueue').transaction(q => {
                const n = (q || 0) + 1;
                database.ref(`orders/${k}`).update({ status: 'approved', queue: n });
                return n;
            });
        }
        function finish(k) { database.ref(`orders/${k}`).update({ status: 'done', panggil: false }); }
        function toggleKiosk(b) { database.ref('system').update({ isPowerOn: b }); }
        function navigateSlide(i) { document.getElementById('master-slider').style.transform = `translateX(-${i*100}vw)`; }
        function resetCust() { cart = []; document.getElementById('display-price').innerText = "Rp0"; document.getElementById('input-name').value = ""; document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected')); }
        function speak(t) { const u = new SpeechSynthesisUtterance(t); u.lang = 'id-ID'; window.speechSynthesis.speak(u); }
        function sapa() { const h = new Date().getHours(); speak(`Selamat ${h<12?'Pagi':h<15?'Siang':h<18?'Sore':'Malam'}, silahkan pilih pesanan anda.`); }
    </script>
</body>
</html>
